<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>巡防百科 · 验证访问</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #1a1a2e;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; color: #333;
  }
  .card {
    background: #fff; border-radius: 12px; padding: 48px 40px;
    max-width: 400px; width: 90%; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .icon { font-size: 48px; margin-bottom: 16px; }
  .title { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: #1a1a2e; }
  .subtitle { font-size: 14px; color: #999; margin-bottom: 32px; }
  .input {
    width: 100%; padding: 12px 16px; font-size: 16px;
    border: 2px solid #e0e0e0; border-radius: 8px; outline: none;
    text-align: center; letter-spacing: 4px;
    transition: border-color 0.2s;
  }
  .input:focus { border-color: #1a1a2e; }
  .btn {
    width: 100%; margin-top: 16px; padding: 12px;
    font-size: 16px; font-weight: 600; color: #fff;
    background: #1a1a2e; border: none; border-radius: 8px;
    cursor: pointer; transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.9; }
  .error { color: #e53e3e; font-size: 14px; margin-top: 12px; min-height: 20px; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">&#x1F512;</div>
  <div class="title">巡防百科</div>
  <div class="subtitle">请输入访问密码</div>
  <input type="password" class="input" id="pwd" placeholder="●●●●●●" maxlength="20" autofocus>
  <button class="btn" id="submit">确认</button>
  <div class="error" id="error"></div>
</div>

<script>
(async function() {
  var VALID = 'f774779300ad6e9cfe4a14160c4b7ddb1b7b3efbdc3a66c706627b821367a53e';
  var COOKIE = 'xunfang_auth';

  function getParam(name) {
    var m = location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
    return m ? decodeURIComponent(m[1]) : '';
  }

  async function sha256(text) {
    var buf = new TextEncoder().encode(text);
    var hash = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash)).map(function(b) { return b.toString(16).padStart(2,'0'); }).join('');
  }

  document.getElementById('submit').addEventListener('click', async function() {
    var pwd = document.getElementById('pwd').value.trim();
    if (!pwd) { document.getElementById('error').textContent = '请输入密码'; return; }
    var h = await sha256(pwd);
    if (h !== VALID) {
      document.getElementById('error').textContent = '密码错误';
      document.getElementById('pwd').value = '';
      return;
    }
    var d = new Date();
    d.setDate(d.getDate() + 7);
    document.cookie = COOKIE + '=' + h + '; expires=' + d.toUTCString() + '; path=/; SameSite=Lax';
    var redir = getParam('redirect');
    location.href = redir || 'index.html';
  });

  document.getElementById('pwd').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('submit').click();
  });
})();
</script>
</body>
</html>

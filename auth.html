<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>巡防百科 · 验证访问</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #1a1a2e;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; color: #333;
  }
  .card {
    background: #fff; border-radius: 12px; padding: 48px 40px;
    max-width: 400px; width: 90%; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .icon { font-size: 48px; margin-bottom: 16px; }
  .title { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: #1a1a2e; }
  .subtitle { font-size: 14px; color: #999; margin-bottom: 32px; }
  .input {
    width: 100%; padding: 12px 16px; font-size: 16px;
    border: 2px solid #e0e0e0; border-radius: 8px; outline: none;
    transition: border-color 0.2s;
  }
  .field { margin-top: 16px; text-align: left; }
  .field label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 600; }
  .password-row { display: flex; gap: 8px; }
  .password-row .input { min-width: 0; }
  .toggle-password { padding: 0 12px; border: 1px solid #bbb; border-radius: 8px; background: #fff; cursor: pointer; }
  .input:focus { border-color: #1a1a2e; }
  .btn {
    width: 100%; margin-top: 16px; padding: 12px;
    font-size: 16px; font-weight: 600; color: #fff;
    background: #1a1a2e; border: none; border-radius: 8px;
    cursor: pointer; transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { cursor: wait; opacity: 0.65; }
  .error { color: #e53e3e; font-size: 14px; margin-top: 12px; min-height: 20px; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">&#x1F512;</div>
  <div class="title">巡防百科</div>
  <div class="subtitle">请使用巡防百科账号登录</div>
  <form id="login-form">
    <div class="field">
      <label for="username">账号</label>
      <input type="text" class="input" id="username" name="username" autocomplete="username" autofocus required>
    </div>
    <div class="field">
      <label for="password">密码</label>
      <div class="password-row">
        <input type="password" class="input" id="password" name="password" autocomplete="current-password" required>
        <button type="button" class="toggle-password" id="toggle-password" aria-pressed="false">显示密码</button>
      </div>
    </div>
    <button type="submit" class="btn" id="submit">登录</button>
    <div class="error" id="error" aria-live="polite"></div>
  </form>
</div>

<script src="js/auth-config.js"></script>
<script src="js/auth-core.js"></script>
<script src="js/auth-page.js"></script>
</body>
</html>
